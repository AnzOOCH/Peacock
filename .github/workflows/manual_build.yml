name: Manual Server Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0' 

      - name: Enable Corepack
        run: corepack enable 

      - name: Install Dependencies
        run: yarn install

      - name: Build Server
        run: yarn build 

      - name: Upload Unlocked Server
        uses: actions/upload-artifact@v4
        with:
          name: peacock-unlocked-files
          path: |
            chunk0.js
            chunk0.js.map
            build/
            resources/
